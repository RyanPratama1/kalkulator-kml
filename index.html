<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator KML Presisi By Riyan Pratama K</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; line-height: 1.6; background-color: #f0f4f8; color: #333; }
        .container { max-width: 850px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin: 0 auto; }
        h2 { color: #2c3e50; border-bottom: 3px solid #e67e22; padding-bottom: 12px; margin-top: 0; }
        
        .mode-selection { display: flex; gap: 20px; margin: 15px 0; background: #f8fafc; padding: 12px 15px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .mode-label { font-weight: 600; color: #475569; display: flex; align-items: center; cursor: pointer; }
        .mode-label input { margin-right: 8px; transform: scale(1.2); cursor: pointer; }

        textarea { width: 100%; height: 180px; margin: 15px 0; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: monospace; font-size: 13px; background-color: #f8fafc; }
        
        /* Layout Tombol Aksi */
        .button-group { display: block; width: 100%; margin-top: 15px; text-align: left; }
        .btn-hitung { background-color: #e67e22; color: white; padding: 14px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 73%; font-weight: bold; transition: background 0.2s; display: inline-block; box-sizing: border-box; }
        .btn-hitung:hover { background-color: #d35400; }
        .btn-clear { background-color: #94a3b8; color: white; padding: 14px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; width: 25%; font-weight: bold; transition: background 0.2s; display: inline-block; float: right; box-sizing: border-box; }
        .btn-clear:hover { background-color: #64748b; }
        .clear-fix { clear: both; }

        .result-box { margin-top: 30px; padding: 20px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; display: none; }
        
        /* Box Ringkasan Oranye */
        .summary-card { background: #fff3e0; border-left: 6px solid #e67e22; padding: 20px; border-radius: 4px; margin-bottom: 25px; }
        .summary-title { margin: 0 0 15px 0; color: #d35400; font-size: 16px; font-weight: bold; border-bottom: 2px solid #fed7aa; padding-bottom: 8px; text-transform: uppercase; }
        .summary-item-row { font-size: 22px; font-weight: bold; color: #e67e22; margin: 12px 0; display: block; }
        .summary-item-row .nama-kabel, .summary-item-row .nama-titik { color: #2c3e50; font-weight: bold; }
        .summary-item-row .sub-km, .summary-item-row .sub-satuan { font-size: 14px; font-weight: normal; color: #64748b; margin-left: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f1f5f9; color: #475569; font-weight: 600; }
        tr:hover { background-color: #f8fafc; }
        .error { color: #e11d48; font-weight: bold; background: #ffe4e6; padding: 10px; border-radius: 4px; border-left: 4px solid #e11d48; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator KML Presisi By Riyan Pratama K</h2>
    <p style="color: #64748b;">Gunakan pilihan di bawah untuk menghitung akumulasi panjang kabel serat optik atau jumlah titik penanda (Tiang/ODP).</p>
    
    <div class="mode-selection">
        <label class="mode-label">
            <input type="radio" name="hitungMode" value="kabel" checked> Hitung Panjang Kabel (Line)
        </label>
        <label class="mode-label">
            <input type="radio" name="hitungMode" value="titik"> Hitung Jumlah Titik (Placemark)
        </label>
    </div>

    <textarea id="kmlInput" placeholder="Tempel (Paste) teks XML/KML di sini..."></textarea>
    
    <div class="button-group">
        <button class="btn-hitung" onclick="prosesKML()">Proses & Hitung Data</button>
        <button class="btn-clear" onclick="clearData()">Clear Data</button>
        <div class="clear-fix"></div>
    </div>

    <div id="result" class="result-box">
        <div class="summary-card">
            <div id="judulBoxRingkasan" class="summary-title">TOTAL PANJANG KESELURUHAN GABUNGAN:</div>
            <div id="kontenMurniRingkasan">
                </div>
        </div>
        
        <h3 style="color: #334155; margin-bottom: 10px; font-size: 16px;">Tabel Rincian:</h3>
        <table id="tabelHasil">
            <thead id="headTabel">
                </thead>
            <tbody id="bodyTabel">
                </tbody>
        </table>
    </div>
</div>

<script>
function hitungJarakWGS84(lon1, lat1, lon2, lat2) {
    const f = 1 / 298.257223563;
    const a = 6378137.0;

    const rlat1 = lat1 * Math.PI / 180;
    const rlon1 = lon1 * Math.PI / 180;
    const rlat2 = lat2 * Math.PI / 180;
    const rlon2 = lon2 * Math.PI / 180;

    const F = (rlat1 + rlat2) / 2;
    const G = (rlat1 - rlat2) / 2;
    const lam = (rlon1 - rlon2) / 2;

    const sG = Math.sin(G);
    const cG = Math.cos(G);
    const sF = Math.sin(F);
    const cF = Math.cos(F);
    const sL = Math.sin(lam);
    const cL = Math.cos(lam);

    const S = sG*sG*cL*cL + cF*cF*sL*sL;
    const C = cG*cG*cL*cL + sF*sF*sL*sL;

    if (S === 0 || C === 0) return 0;

    const omega = Math.atan(Math.sqrt(S / C));
    const R = Math.sqrt(S * C) / omega;
    const D = 2 * omega * a;

    const H1 = (3 * R - 1) / (2 * C);
    const H2 = (3 * R + 1) / (2 * S);

    return D * (1 + f * H1 * sF * sF * cG * cG - f * H2 * sG * sG * cF * cF);
}

// Fungsi Baru untuk Mengosongkan Data (Clear)
function clearData() {
    document.getElementById('kmlInput').value = "";
    document.getElementById('kontenMurniRingkasan').innerHTML = "";
    document.getElementById('bodyTabel').innerHTML = "";
    document.getElementById('headTabel').innerHTML = "";
    document.getElementById('result').style.display = "none";
    document.getElementById('kmlInput').focus();
}

function prosesKML() {
    const xmlText = document.getElementById('kmlInput').value;
    const resultBox = document.getElementById('result');
    const kontenMurniRingkasan = document.getElementById('kontenMurniRingkasan');
    const judulBoxRingkasan = document.getElementById('judulBoxRingkasan');
    const headTabel = document.getElementById('headTabel');
    const bodyTabel = document.getElementById('bodyTabel');
    
    if (!xmlText.trim()) {
        alert("Silakan tempel (paste) teks KML terlebih dahulu!");
        return;
    }
    
    const mode = document.querySelector('input[name="hitungMode"]:checked').value;
    bodyTabel.innerHTML = "";
    kontenMurniRingkasan.innerHTML = "";
    
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
    const placemarks = xmlDoc.getElementsByTagName("Placemark");
    
    if (placemarks.length === 0) {
        headTabel.innerHTML = "";
        bodyTabel.innerHTML = "<tr><td class='error'>Error: Tidak ditemukan objek Placemark di dalam KML ini!</td></tr>";
        resultBox.style.display = "block";
        return;
    }

    if (mode === "kabel") {
        judulBoxRingkasan.innerText = "TOTAL PANJANG KESELURUHAN GABUNGAN:";
        headTabel.innerHTML = `<tr>
            <th style="width: 80px;">No.</th>
            <th>Nama Objek Jalur (LineString)</th>
            <th style="text-align: right;">Panjang Jalur</th>
        </tr>`;

        let rekapPanjangNama = {}; 
        let nomorUrut = 1;
        let adaJalur = false;

        for (let i = 0; i < placemarks.length; i++) {
            const placemark = placemarks[i];
            const lineString = placemark.getElementsByTagName("LineString");
            
            if (lineString.length > 0) {
                const nameObjek = placemark.getElementsByTagName("name")[0]?.textContent || "Tanpa Nama";
                const coordinatesElement = placemark.getElementsByTagName("coordinates")[0];
                
                if (coordinatesElement) {
                    let coordText = coordinatesElement.textContent.trim();
                    let points = coordText.split(/\s+/);
                    let daftarKoordinat = [];
                    
                    for (let k = 0; k < points.length; k++) {
                        if (points[k]) {
                            let parts = points[k].split(',');
                            if (parts.length >= 2) {
                                daftarKoordinat.push({lon: parseFloat(parts[0]), lat: parseFloat(parts[1])});
                            }
                        }
                    }

                    let jarakJalurIni = 0;
                    for (let j = 0; j < daftarKoordinat.length - 1; j++) {
                        let p1 = daftarKoordinat[j];
                        let p2 = daftarKoordinat[j+1];
                        jarakJalurIni += hitungJarakWGS84(p1.lon, p1.lat, p2.lon, p2.lat);
                    }

                    if (jarakJalurIni > 0) {
                        adaJalur = true;
                        
                        if (rekapPanjangNama[nameObjek]) {
                            rekapPanjangNama[nameObjek] += jarakJalurIni;
                        } else {
                            rekapPanjangNama[nameObjek] = jarakJalurIni;
                        }
                        
                        let jarakBulatRincian = Math.round(jarakJalurIni);
                        let meterFormatted = jarakBulatRincian.toLocaleString('id-ID') + " m";
                        let kmFormatted = (jarakJalurIni / 1000).toFixed(3).replace('.', ',') + " km";

                        bodyTabel.innerHTML += `<tr>
                            <td>${nomorUrut}</td>
                            <td style="font-weight: 500; color: #1e293b;">${nameObjek}</td>
                            <td style="text-align: right; font-weight: bold; color: #e67e22;">${meterFormatted} <span style="font-weight:normal; font-size:12px; color:#64748b;">(${kmFormatted})</span></td>
                        </tr>`;
                        nomorUrut++;
                    }
                }
            }
        }

        if (adaJalur) {
            let HTMLHasilRekap = "";
            for (const [namaKabel, totalMurni] of Object.entries(rekapPanjangNama)) {
                let totalBulat = Math.round(totalMurni);
                let totalKM = (totalMurni / 1000).toFixed(3).replace('.', ',');
                
                HTMLHasilRekap += `<span class="summary-item-row">
                    <span class="nama-kabel">${namaKabel} :</span> 
                    ${totalBulat.toLocaleString('id-ID')} Meter <span class="sub-km">atau (${totalKM} KM)</span>
                </span>`;
            }
            kontenMurniRingkasan.innerHTML = HTMLHasilRekap;
        } else {
            kontenMurniRingkasan.innerHTML = "<span class='summary-item-row'>0 Meter</span>";
            bodyTabel.innerHTML = "<tr><td colspan='3' style='text-align:center; color:#64748b;'>Tidak ada data objek garis (LineString) untuk dihitung.</td></tr>";
        }

    } else {
        judulBoxRingkasan.innerText = "TOTAL JUMLAH TITIK PLACEMARK GABUNGAN:";
        headTabel.innerHTML = `<tr>
            <th style="width: 80px;">No.</th>
            <th>Nama Titik (Placemark)</th>
            <th style="text-align: right;">Koordinat (Lat, Lon)</th>
        </tr>`;

        let rekapJumlahTitik = {}; 
        let nomorUrut = 1;
        let adaTitik = false;

        for (let i = 0; i < placemarks.length; i++) {
            const placemark = placemarks[i];
            const pointElement = placemark.getElementsByTagName("Point");
            
            if (pointElement.length > 0) {
                adaTitik = true;
                const nameObjek = placemark.getElementsByTagName("name")[0]?.textContent || "Tanpa Nama";
                const coordElement = placemark.getElementsByTagName("coordinates")[0];
                let koordinatTeks = "-";
                
                if (coordElement) {
                    let coordText = coordElement.textContent.trim();
                    let parts = coordText.split(',');
                    if (parts.length >= 2) {
                        koordinatTeks = `${parseFloat(parts[1]).toFixed(6)}, ${parseFloat(parts[0]).toFixed(6)}`;
                    }
                }

                if (rekapJumlahTitik[nameObjek]) {
                    rekapJumlahTitik[nameObjek] += 1;
                } else {
                    rekapJumlahTitik[nameObjek] = 1;
                }

                bodyTabel.innerHTML += `<tr>
                    <td>${nomorUrut}</td>
                    <td style="font-weight: 500; color: #1e293b;">${nameObjek}</td>
                    <td style="text-align: right; font-family: monospace; color: #2563eb; font-weight: 500;">${koordinatTeks}</td>
                </tr>`;
                nomorUrut++;
            }
        }

        if (adaTitik) {
            let HTMLHasilRekapTitik = "";
            for (const [namaTitik, jumlah] of Object.entries(rekapJumlahTitik)) {
                HTMLHasilRekapTitik += `<span class="summary-item-row">
                    <span class="nama-titik">${namaTitik} :</span> 
                    ${jumlah} <span class="sub-satuan">Titik / Node</span>
                </span>`;
            }
            kontenMurniRingkasan.innerHTML = HTMLHasilRekapTitik;
        } else {
            kontenMurniRingkasan.innerHTML = "<span class='summary-item-row'>0 Titik</span>";
            bodyTabel.innerHTML = "<tr><td colspan='3' style='text-align:center; color:#64748b;'>Tidak ditemukan objek penanda titik (&lt;Point&gt;) khusus di dalam KML ini.</td></tr>";
        }
    }

    resultBox.style.display = "block";
}
</script>

</body>
</html>
